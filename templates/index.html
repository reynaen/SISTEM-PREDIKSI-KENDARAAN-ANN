<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prediksi Kendaraan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9eb5, #ffc1cc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            border-radius: 25px;
            border: none;
            padding: 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #ff4d88;
            font-weight: 600;
        }

        .form-control {
            border-radius: 12px;
            padding: 10px;
        }

        .btn-pink {
            background: linear-gradient(45deg, #ff4d88, #ff1a66);
            color: white;
            border-radius: 12px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-pink:hover {
            transform: scale(1.05);
        }

        .icon {
            font-size: 45px;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="card shadow-lg">
    <div class="icon">🚗💗</div>
    <h2>Prediksi Kendaraan</h2>
    <p class="subtitle">Masukkan tahun untuk melihat prediksi jumlah kendaraan</p>

    <form action="/predict" method="post">
        <input type="number" name="tahun" class="form-control mt-3" placeholder="Contoh: 2025" required>

        <button class="btn btn-pink w-100 mt-3">Prediksi Sekarang</button>
    </form>
</div>

</body>
</html>
