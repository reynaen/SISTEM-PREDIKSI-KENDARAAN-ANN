<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hasil Prediksi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9eb5, #ffc1cc);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            border-radius: 25px;
            border: none;
            padding: 25px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #ff4d88;
            font-weight: 600;
        }

        .box {
            background: #fff0f5;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }

        .label {
            font-size: 14px;
            color: #888;
        }

        .value {
            font-size: 22px;
            font-weight: 600;
            color: #e6005c;
        }

        img {
            width: 100%;
            border-radius: 15px;
            margin-top: 15px;
            transition: 0.5s;
        }

        img:hover {
            transform: scale(1.03);
        }

        .btn-pink {
            background: linear-gradient(45deg, #ff4d88, #ff1a66);
            color: white;
            border-radius: 12px;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-pink:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="card shadow-lg">
    <h2>📊 Hasil Prediksi</h2>

    <div class="box">
        <div class="label">Tahun</div>
        <div class="value">{{ tahun }}</div>

        <div class="label mt-2">Jumlah Kendaraan</div>
        <div class="value">{{ hasil }}</div>
    </div>

    <!-- GRAFIK -->
    <img src="data:image/png;base64,{{ grafik }}" alt="Grafik Prediksi">

    <button onclick="location.href='index.html'">Kembali</button>
</div>

</body>
</html>
